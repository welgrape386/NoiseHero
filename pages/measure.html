<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>소음ON - 실시간 측정</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap"
    rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="../css/measure.css" />
</head>

<body>

  <div class="screen">

    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Grain -->
    <div class="screen-grain"></div>

    <!-- Content -->
    <div class="screen-content">

      <!-- Header -->
      <div class="screen-header">

        <button class="back-btn" onclick="location.href='../index.html'">
          <svg width="18" height="18" fill="none" stroke="#0A1866" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>

        <h1 class="screen-title">실시간 측정</h1>

        <div class="live-badge">
          <div class="live-dot"></div>
          <span>LIVE</span>
        </div>

      </div>

      <!-- Warning Banner -->
      <div class="warn-banner">

        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>

        <div>
          <div class="warn-title">법적 기준 초과 감지</div>
          <div class="warn-sub">
            현재 Leq 62 dB — 기준(39 dB) 초과 +23 dB
          </div>
        </div>

      </div>

      <!-- Toggle -->
      <div class="toggle-group">

        <button class="toggle-pill active">
          직접충격
        </button>

        <button class="toggle-pill inactive">
          공기전달
        </button>

      </div>

      <!-- Gauge -->
      <div class="gauge-container">

        <svg width="260" height="260" viewBox="0 0 260 260">

          <defs>

            <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#1A3BDB" />
              <stop offset="60%" stop-color="#6B8AFF" />
              <stop offset="100%" stop-color="#D93025" />
            </linearGradient>

            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>

          </defs>

          <!-- Track -->
          <circle cx="130" cy="130" r="108" fill="none" stroke="rgba(26,59,219,0.08)" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="440 440" transform="rotate(-220 130 130)" />

          <!-- Inner Ring -->
          <circle cx="130" cy="130" r="92" fill="none" stroke="rgba(26,59,219,0.05)" stroke-width="1" />

          <!-- Active Arc -->
          <circle cx="130" cy="130" r="108" fill="none" stroke="url(#gaugeGrad)" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="0 440" transform="rotate(-220 130 130)" class="gauge-arc"
            filter="url(#glow)" />

        </svg>

        <!-- Center -->
        <div class="gauge-center">

          <div class="gauge-live-dot"></div>

          <div class="gauge-value" id="gauge-val">
            62
          </div>

          <div class="gauge-unit">
            dB(A)
          </div>

          <div class="gauge-status">
            기준 초과
          </div>

        </div>

      </div>

      <!-- Action Buttons -->
    <div class="action-row">

      <button class="action-btn-stop">
        측정 중지
      </button>

      <button class="action-btn-save">
        이력 저장
      </button>

    </div>

      <!-- Info Card -->
      <div class="glass-card">

        <div class="info-row">
          <span class="info-key">측정 시간</span>
          <span class="info-val">01:23</span>
        </div>

        <div class="info-row">
          <span class="info-key">Leq (1분 평균)</span>
          <span class="info-val danger">62 dB(A)</span>
        </div>

        <div class="info-row">
          <span class="info-key">Lmax (최고값)</span>
          <span class="info-val danger">71 dB(A)</span>
        </div>

        <div class="info-row">
          <span class="info-key">시간대</span>
          <div class="time-badge">주간 09:41</div>
        </div>

        <div class="info-row">
          <span class="info-key">법적 기준</span>
          <span class="info-val">Leq 39 / Lmax 57 dB</span>
        </div>

      </div>

      <!-- AI Result -->
      <div class="ai-result">

        <div class="ai-label">
          AI 소음 분류 결과
        </div>

        <div class="ai-chips">

          <div class="ai-chip primary">
            ⓘ 발소리
          </div>

          <div class="ai-chip primary">
            충격음
          </div>

          <div class="ai-chip secondary">
            반복성
          </div>

          <div class="ai-chip danger">
            고강도
          </div>

        </div>

      </div>

    </div>

    <!-- Tab bar -->
    <div class="tab-bar">

      <div class="tab-item active" onclick="location.href='../index.html'">
        <svg width="22" height="22" fill="none" stroke="#1A3BDB" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span class="tab-label active-label">홈</span>
      </div>

      <div class="tab-item" onclick="location.href='./measure.html'">

        <svg width="22" height="22" fill="none" stroke="#7A8AB8" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <circle cx="12" cy="12" r="3" />
        </svg>

        <span class="tab-label">측정</span>
      </div>

      <div class="tab-item" onclick="location.href='./report.html'">

        <svg width="22" height="22" fill="none" stroke="#7A8AB8" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        </svg>

        <span class="tab-label">이력</span>
      </div>

      <div class="tab-item" onclick="location.href='./report-guide.html'">

        <svg width="22" height="22" fill="none" stroke="#7A8AB8" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" viewBox="0 0 24 24">
          <path
            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.23h3a2 2 0 0 1 2 1.72" />
        </svg>

        <span class="tab-label">신고안내</span>
      </div>

      <div class="tab-item" onclick="location.href='./chatbot.html'">

        <svg width="22" height="22" fill="none" stroke="#7A8AB8" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>

        <span class="tab-label">AI상담</span>
      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="../js/measure.js"></script>

</body>

</html>
